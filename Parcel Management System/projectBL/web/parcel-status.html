<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Parcel Status | Parcel Portal</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body data-page="parcel-status">
    <header class="page-header">
        <div class="container">
            <h1>Parcel Status</h1>
            <p>Check the latest delivery status by entering your booking ID.</p>
            <div id="sessionInfo" class="session-info"></div>
            <nav class="page-nav">
                <a href="index.html">Landing</a>
                <a href="login.html">Login</a>
                <a href="register.html">Register</a>
                <a href="home.html">Homepage</a>
                <a href="book.html">Booking</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="card">
            <h2>Parcel status lookup</h2>
            <form id="parcelStatusForm">
                <label>Booking ID<input name="bookingId" required pattern="\\d+" /></label>
                <button type="submit">Check parcel status</button>
                <div class="message" id="parcelStatusMessage"></div>
            </form>
            <div class="summary hidden" id="parcelStatusSummary"></div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
