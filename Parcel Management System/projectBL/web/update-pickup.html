<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Update Pickup | Parcel Portal</title>
    <link rel="stylesheet" href="style.css" />
</head>
<body data-page="update-pickup">
    <header class="page-header">
        <div class="container">
            <h1>Update Pickup Details</h1>
            <p>Change pickup and dropoff times for an existing booking.</p>
            <div id="sessionInfo" class="session-info"></div>
            <nav class="page-nav">
                <a href="index.html">Landing</a>
                <a href="login.html">Login</a>
                <a href="register.html">Register</a>
                <a href="home.html">Homepage</a>
                <a href="book.html">Booking</a>
            </nav>
        </div>
    </header>

    <main class="container">
        <section class="card">
            <h2>Update schedule</h2>
            <form id="updatePickupForm">
                <label>Booking ID<input name="bookingId" required pattern="\\d+" /></label>
                <label>Pickup Time<input name="pickupTime" required placeholder="09:00 AM" /></label>
                <label>Dropoff Time<input name="dropoffTime" required placeholder="05:00 PM" /></label>
                <button type="submit">Save Changes</button>
                <div class="message" id="updateTimeMessage"></div>
            </form>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
